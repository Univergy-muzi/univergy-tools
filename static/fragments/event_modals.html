<!-- Pico.css 정제 모달 -->
<div id="eventModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000;">
    <dialog open style="
        margin: auto;
        margin-top: 8vh;
        background: var(--pico-background-color);
        border-radius: var(--pico-border-radius);
        padding: 1.5rem 2rem;
        max-width: 720px;
        width: 95%;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    ">
        <article>
        <header style="margin-bottom: 1rem;">
            <h4 style="margin: 0.25rem 0; font-size: 1.25rem;">予定を追加</h4>
        </header>

        <form onsubmit="return false;">
            <!-- 제목 -->
            <input id="eventTitle" type="text" placeholder="予定のタイトル" aria-label="タイトル" required style="margin-bottom: 1.25rem;" />

            <!-- 날짜 및 시각 -->
            <div class="grid" style="grid-template-columns: 2fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
            <input id="eventDate" type="date" aria-label="日付" required />
            <input id="startTime" type="text" placeholder="開始時刻 (0900)" aria-label="開始時刻" />
            <input id="endTime" type="text" placeholder="終了時刻 (1000)" aria-label="終了時刻" />
            </div>

            <!-- 설명 -->
            <textarea id="eventDesc" placeholder="予定の詳細を入力" aria-label="詳細" rows="5" style="width: 100%; resize: vertical;"></textarea>

            <!-- 버튼 -->
            <footer style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
            <button type="button" id="cancelEventBtn" class="secondary">キャンセル</button>
            <button type="button" id="saveEventBtn" class="contrast">保存</button>
            </footer>
        </form>
        </article>
    </dialog>
</div>

<!-- 일정 상세 보기 모달 (가로폭 확장 + 버튼 정렬 개선) -->
<div id="eventDetailModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000;">
    <dialog open style="
        margin: auto;
        margin-top: 8vh;
        background: var(--pico-background-color);
        border-radius: var(--pico-border-radius);
        padding: 1.5rem 2rem;
        width: 740px;        /* ✅ 고정 폭으로 확보 */
        max-width: 90vw;     /* ✅ 반응형 대응 */
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    ">
        <article>
        <!-- 타이틀 -->
        <header style="margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--pico-muted-border-color);">
            <h4 id="detailTitle" style="margin: 0; font-size: 1.25rem;">予定詳細</h4>
        </header>

        <!-- 본문 정보 -->
        <div style="line-height: 1.8;">
            <p><strong>日付:</strong> <span id="detailDate"></span></p>
            <p><strong>時間:</strong> <span id="detailTime"></span></p>
            <p><strong>詳細:</strong><br><span id="detailDescription"></span></p>
        </div>

        <!-- 버튼 영역 -->
        <footer style="
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: nowrap;
        ">
            <button type="button" id="editEventBtn" class="contrast" style="min-width: 140px; white-space: nowrap;">✏️ 編集</button>
            <button type="button" id="deleteEventBtn" class="secondary" style="min-width: 140px; white-space: nowrap;">🗑️ 削除</button>
            <button type="button" id="closeDetailBtn" style="min-width: 140px; white-space: nowrap; background-color: var(--pico-primary); color: rgb(135, 200, 243);">閉じる</button>
        </footer>
        </article>
    </dialog>
</div>
