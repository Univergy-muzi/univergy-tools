<section class="explain-section">
  <hgroup>
    <h2>業務自動化ツールハブ</h2>

<section id="tools" class="tool-section">
  <h3>利用可能なツール</h3>
  <p>以下は現在使用可能な主な業務ツールの一覧です。随時更新予定です：</p>

  <div class="xml-tool-group" style="margin-bottom: 2rem;">
    <h4>ㅤ①ㅤ確定使用量XML分析</h4>
    <form method="POST" action="/kakutei" enctype="multipart/form-data">
      <label class="custom-btn">
        フォルダを選択
        <input type="file" id="fileInput" name="files" webkitdirectory directory multiple accept=".xml" />
      </label>
      <div id="fileListContainer" style="margin-top:1rem;">
        <p class="file-list-label">選択されたXMLファイル:</p>
        <ul id="fileList"></ul>
      </div>
      <button type="submit">✅ 確定使用量XML分析実行</button>
    </form>
  </div>

  <hr />

  <div class="xml-tool-group" style="margin-bottom: 2rem;">
    <h4>ㅤ②ㅤTEST</h4>
    <p><a href="/run-csv-tool" class="custom-btn" target="_blank">📂 TESTボタン</a></p>
  </div>
</section>

<section class="tool-section">
